    <style>
        .calculator-container {
            max-width: 800px;
            margin: 2rem auto;
            text-align: center;
        }

        .input-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        .input-group input {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            color: white;
            font-size: 1.2rem;
            width: 200px;
            outline: none;
            transition: all 0.3s;
            text-align: center;
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(193, 155, 74, 0.2);
        }

        .btn-calculate {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border: none;
            padding: 1rem 2.5rem;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 5px 15px rgba(193, 155, 74, 0.3);
        }

        .btn-calculate:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(193, 155, 74, 0.5);
        }

        .btn-calculate:active {
            transform: translateY(-1px);
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
            margin-bottom: 3rem;
        }

        .holiday-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 1.5rem;
            text-align: center;
            transition: all 0.3s ease;
            animation: fadeInScale 0.5s ease-out forwards;
            opacity: 0;
            position: relative;
            overflow: hidden;
        }

        .holiday-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--primary);
            opacity: 0.5;
        }

        .holiday-card.fixed::after {
            background: #10b981; /* Green for fixed */
        }

        .holiday-card.movable::after {
            background: var(--primary); /* Gold for movable */
        }

        .holiday-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px var(--shadow-color);
        }

        .section-title-alt {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            color: var(--text-main);
            margin: 3rem 0 1.5rem;
            text-align: left;
            padding-left: 1rem;
            border-left: 4px solid var(--primary);
            background: linear-gradient(90deg, rgba(193, 155, 74, 0.1), transparent);
        }

        .holiday-name {
            font-family: 'Noto Serif Ethiopic', serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .holiday-date {
            font-family: 'Noto Serif Ethiopic', serif;
            font-size: 1.1rem;
            color: var(--text-main);
        }

        .year-indicator {
            font-size: 1.1rem;
            color: var(--text-dim);
            margin-bottom: 2rem;
        }

        .year-indicator span {
            color: var(--primary);
            font-weight: 700;
        }

        @media (max-width: 600px) {
            .input-group input {
                width: 100%;
            }
            .btn-calculate {
                width: 100%;
            }
        }
    </style>
</head>
