<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#022c22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#064e3b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="15" />
      <feOffset dx="0" dy="10" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGradient)" rx="20" />
  
  <!-- Subtle Pattern -->
  <circle cx="1100" cy="100" r="200" fill="white" opacity="0.03" />
  <circle cx="100" cy="300" r="150" fill="white" opacity="0.03" />

  <!-- Main Title -->
  <text x="50%" y="180" font-family="'Outfit', sans-serif" font-size="64" font-weight="bold" fill="#c19b4a" text-anchor="middle" filter="url(#shadow)">ARAT KILO GIBI GUBAE</text>
  <text x="50%" y="250" font-family="'Outfit', sans-serif" font-size="32" font-weight="300" fill="white" text-anchor="middle" opacity="0.8">Community Hub | Academic Excellence &amp; Spiritual Wisdom</text>

  <!-- Icons Group -->
  <g transform="translate(450, 300)" opacity="0.9">
    <!-- Academic -->
    <path d="M0 10 L40 30 L80 10 L40 -10 Z M0 10 V25 L40 45 L80 25 V10" fill="none" stroke="#c19b4a" stroke-width="2" />
    <!-- Spiritual -->
    <path d="M120 -10 V40 M100 0 H140" fill="none" stroke="#c19b4a" stroke-width="3" transform="translate(10, 0)" />
    <!-- Community -->
    <circle cx="250" cy="15" r="15" fill="none" stroke="#c19b4a" stroke-width="2" />
    <path d="M230 45 Q250 25 270 45" fill="none" stroke="#c19b4a" stroke-width="2" />
  </g>
</svg>
